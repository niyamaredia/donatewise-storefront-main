<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DonateWise Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">
  <main class="login-page">
    <section class="login-card reveal">

      <div class="login-brand">
        <p class="eyebrow">DONATEWISE</p>
        <h1>Staff Inventory Portal</h1>
        <p>Secure internal storefront powered by SharePoint</p>
      </div>

      <!-- Microsoft Login Button -->
      <button id="microsoftLoginBtn" class="login-btn">
        Sign in with Microsoft
      </button>

      <p class="login-note">
        Access managed through Microsoft Entra ID
      </p>

    </section>
  </main>

  <!-- MSAL (Microsoft login library) -->
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>

  <!-- Your JS -->
  <script src="script.js"></script>
</body>
</html>
